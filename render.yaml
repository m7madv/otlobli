services:
  # ─── WhatsApp OTP Server ───────────────────────────────────────────────────
  - type: web
    name: talabieh-whatsapp
    runtime: node
    plan: free
    rootDir: server-whatsapp
    buildCommand: npm install
    startCommand: node src/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      # AUTH_DIR يحدد أين تُحفظ جلسة WhatsApp (baileys-auth)
      # مهم: نفّذ ping كل 5 دقائق عبر UptimeRobot حتى لا ينام السيرفر
      - key: AUTH_DIR
        value: /opt/render/project/src/baileys-auth

  # ─── Shein Scraper ────────────────────────────────────────────────────────
  - type: web
    name: talabieh-scraper
    runtime: node
    plan: free
    rootDir: server-scraper
    buildCommand: npm install
    startCommand: node src/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production

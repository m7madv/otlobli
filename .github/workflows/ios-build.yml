name: iOS Build

on:
  push:
    branches: [main, ios-direct-load-vpn]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Create env file
        run: |
          echo "VITE_WHATSAPP_API_URL=https://otlobli-whatsapp-production.up.railway.app" > .env
          echo "VITE_WHATSAPP_AUTH_MODE=real" >> .env

      - name: Build web app
        run: npx vite build
        env:
          VITE_WHATSAPP_API_URL: https://otlobli-whatsapp-production.up.railway.app
          VITE_WHATSAPP_AUTH_MODE: real

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build iOS (unsigned)
        run: |
          xcodebuild archive \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            2>&1 | tail -50

      - name: Package IPA
        run: |
          APP_PATH=$(find "$RUNNER_TEMP/App.xcarchive/Products/Applications" -name "*.app" | head -1)
          echo "Found app at: $APP_PATH"
          mkdir -p "$RUNNER_TEMP/Payload"
          cp -r "$APP_PATH" "$RUNNER_TEMP/Payload/"
          cd "$RUNNER_TEMP"
          zip -r otlobli.ipa Payload/
          ls -lh otlobli.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: otlobli-ios-${{ github.run_number }}
          path: ${{ runner.temp }}/otlobli.ipa
          retention-days: 30

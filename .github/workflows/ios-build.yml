name: iOS Build

on:
  push:
    branches: [main, ios-direct-load-vpn]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Build iOS (unsigned)
        run: |
          xcodebuild archive \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -destination "generic/platform=iOS" \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            | xcpretty || true

      - name: Package IPA
        run: |
          mkdir -p $RUNNER_TEMP/Payload
          cp -r "$RUNNER_TEMP/App.xcarchive/Products/Applications/App.app" \
                "$RUNNER_TEMP/Payload/"
          cd $RUNNER_TEMP
          zip -r otlobli.ipa Payload/

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: otlobli-ios-${{ github.run_number }}
          path: ${{ runner.temp }}/otlobli.ipa
          retention-days: 30

      - name: Create Release (on main branch)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ios-v${{ github.run_number }}
          name: "طلبية iOS - إصدار ${{ github.run_number }}"
          body: |
            ## تثبيت التطبيق على iPhone
            1. حمّل ملف `otlobli.ipa`
            2. افتح **AltStore** أو **Sideloadly** على جهازك
            3. اختر الملف وثبّته
          files: ${{ runner.temp }}/otlobli.ipa
          draft: false
